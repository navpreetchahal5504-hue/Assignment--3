<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Three - Debugging Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Assignment Three: Debugging Challenge</h1>

    <section>
        <h2>1. Greeting Button</h2>
        <button id="helloBtn">Say Hello</button>
        <p id="greetingOutput"></p>
    </section>

    <section>
        <h2>2. Theme Toggle</h2>
        <button id="themeBtn">Toggle Dark Mode</button>
    </section>

    <section>
        <h2>3. Live Input</h2>
        <input type="text" id="messageInput" placeholder="Type a message">
        <p id="liveOutput"></p>
    </section>

    <section>
        <h2>4. Welcome Form</h2>
        <form id="welcomeForm">
            <label for="nameInput">Enter your name:</label>
            <input type="text" id="nameInput">
            <button type="submit">Submit</button>
        </form>
        <p id="formOutput"></p>
    </section>

    <script src="broken.js"></script>
</body>
</html>
